# Builds Nodex (Electron Forge) for Linux and publishes a GitHub Release
# when you push a version tag (v*). Plugins are released by a separate workflow.
#
# Trigger a tag push:
#   git tag v0.1.0
#   git push origin v0.1.0
#
# Manual run: Actions → Release → Run workflow, then provide `release_tag` (for example v0.1.0).

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag name to publish (for example: v0.1.0)"
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Make Linux (.deb + AppImage)
        run: npm run build:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-dist
          path: |
            dist/deb
            dist/appimage
          if-no-files-found: error
          retention-days: 14

  publish-release:
    needs:
      - build-linux
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*"
          merge-multiple: true
          path: release-assets

      - name: Create GitHub Release and upload files
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          name: Nodex ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
