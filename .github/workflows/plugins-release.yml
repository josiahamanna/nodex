# Build & package each plugin under `user-pluggins/*` into its own `.nodexplugin`.
# On version tags (v*), also publishes the plugin packages to the GitHub Release.

name: Plugins Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: plugins-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        name: Discover plugins under user-pluggins/
        shell: bash
        run: |
          node -e "const fs=require('fs'); const path=require('path'); const root=path.resolve('user-pluggins'); let names=[]; if (fs.existsSync(root)) { for (const ent of fs.readdirSync(root,{withFileTypes:true})) { if (!ent.isDirectory() || ent.name.startsWith('.')) continue; const mp=path.join(root,ent.name,'manifest.json'); if (fs.existsSync(mp)) names.push(ent.name); } } names.sort(); const matrix=JSON.stringify({include:names.map(n=>({plugin:n}))}); console.log('matrix='+matrix); fs.appendFileSync(process.env.GITHUB_OUTPUT, `matrix=${matrix}\n`);"

  build:
    needs: discover
    if: ${{ fromJSON(needs.discover.outputs.matrix).include[0] != null }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install repo dependencies
        run: npm ci

      - name: Build .nodexplugin
        env:
          PLUGIN_RELEASE_ROOT: user-pluggins
          PLUGIN_RELEASE_ONLY: ${{ matrix.plugin }}
          PLUGIN_RELEASE_OUT: out/make/plugins
        run: npm run build:plugins-release

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.plugin }}
          path: out/make/plugins/*.nodexplugin
          if-no-files-found: error
          retention-days: 14

  publish-release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download plugin artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "plugin-*"
          merge-multiple: true
          path: plugin-assets

      - name: Upload plugin assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            plugin-assets/**/*.nodexplugin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

