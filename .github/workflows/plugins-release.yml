# Build all plugins under `user-pluggins/*`, write `dist/plugins` (+ marketplace-index.json),
# zip the folder into one artifact. On version tags (v*), attach that zip to the GitHub Release.

name: Plugins Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: plugins-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      has_plugins: ${{ steps.set.outputs.has_plugins }}
    steps:
      - uses: actions/checkout@v4
      - id: set
        name: Detect plugins under user-pluggins/
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");
          const out = process.env.GITHUB_OUTPUT;
          const root = path.resolve("user-pluggins");
          let n = 0;
          if (fs.existsSync(root)) {
            for (const ent of fs.readdirSync(root, { withFileTypes: true })) {
              if (!ent.isDirectory() || ent.name.startsWith(".")) continue;
              const mp = path.join(root, ent.name, "manifest.json");
              if (fs.existsSync(mp)) n++;
            }
          }
          const has = n > 0 ? "true" : "false";
          fs.appendFileSync(out, `has_plugins=${has}\n`);
          NODE

  build-and-bundle:
    needs: discover
    if: needs.discover.outputs.has_plugins == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install repo dependencies
        run: npm ci

      - name: Build all .nodexplugin packages and marketplace index
        env:
          PLUGIN_RELEASE_ROOT: user-pluggins
        run: npm run build:plugins

      - name: Zip dist/plugins
        run: |
          cd dist/plugins
          zip -r "$GITHUB_WORKSPACE/nodex-marketplace-plugins.zip" .

      - name: Upload marketplace bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: nodex-marketplace-plugins
          path: nodex-marketplace-plugins.zip
          if-no-files-found: error
          retention-days: 14

  publish-release:
    needs: [discover, build-and-bundle]
    if: |
      always() &&
      startsWith(github.ref, 'refs/tags/') &&
      needs.discover.outputs.has_plugins == 'true' &&
      needs.build-and-bundle.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download marketplace zip
        uses: actions/download-artifact@v4
        with:
          name: nodex-marketplace-plugins
          path: release-assets

      - name: Upload bundle to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release-assets/nodex-marketplace-plugins.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
