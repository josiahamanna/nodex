# Drone pipelines for Nodex (local drone-runner-docker; GitHub as Git + OAuth provider).
# Default: lint + unit tests on push/PR to main.
# Mongo service: sync-api integration test (integration-auth-wpn.test.ts) runs instead of skipping.
# Tags v*: same CI gate; full multi-OS releases stay in .github/workflows/release.yml unless you add runners.

kind: pipeline
type: docker
name: ci

trigger:
  event:
    - push
    - pull_request
  branch:
    - main
    - master

services:
  - name: mongo
    image: mongo:7
    ports:
      - 27017

steps:
  - name: install-lint-test
    image: node:22-bookworm
    environment:
      MONGODB_URI: mongodb://mongo:27017
    commands:
      - apt-get update && apt-get install -y --no-install-recommends python3 make g++ ca-certificates git
      - sleep 5
      - npm ci
      - npm run lint
      - npm run test

---
kind: pipeline
type: docker
name: verify-tag

trigger:
  event:
    - tag
  ref:
    - refs/tags/v*

services:
  - name: mongo
    image: mongo:7
    ports:
      - 27017

steps:
  - name: install-lint-test
    image: node:22-bookworm
    environment:
      MONGODB_URI: mongodb://mongo:27017
    commands:
      - apt-get update && apt-get install -y --no-install-recommends python3 make g++ ca-certificates git
      - sleep 5
      - npm ci
      - npm run lint
      - npm run test
