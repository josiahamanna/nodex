# Nodex headless API — mount a host project directory into the container.
# MongoDB for Fastify sync API: docker compose --profile sync up -d mongo-sync  (see apps/nodex-sync-api)
#
# Usage — set NODEX_HOST_PROJECT to your vault (Compose does not expand $HOME in .env files):
#   export NODEX_HOST_PROJECT="$HOME/Documents/my-vault"   # shell expands $HOME → absolute path
#   npm run docker:api:up
#
# If unset, Compose uses ./.nodex-docker-workspace (created as needed).
#
# Same-origin browser UI: use nodex-gateway (e.g. :8080) so the browser calls /api/v1 on the gateway
# (proxied to nodex-api). For Next alone, set NODEX_HEADLESS_API_ORIGIN at build/runtime, or build
# nodex-web with NEXT_PUBLIC_NODEX_API_SAME_ORIGIN=1 when the app is only served behind that proxy.
#
# Or use an absolute path directly:
#   NODEX_HOST_PROJECT=/home/you/Documents/my-vault npm run docker:api:up
#
# Build image only: npm run docker:api:build
# Detached:        npm run docker:api:up:detached
# Stop:            npm run docker:api:down
# Follow logs:     npm run docker:logs  (all compose services; add e.g. nodex-api to filter)
#
# Unified gateway (nginx on host port NODEX_GATEWAY_PORT, default 8080 for Cloudflare Tunnel):
#   Point cloudflared to http://127.0.0.1:8080 (see deploy/ZERO-DOWNTIME.md).
#   - / → Next UI (active nodex-web-blue or nodex-web-green)
#   - /backend/api/ → /api/v1/
#   - /backend/market/ → /marketplace/files/
#   - /api/v1/ and /marketplace/files/ are also proxied for compatibility
#
# API-only (no nginx): docker compose up nodex-api
#
# Direct API (bypass gateway): http://127.0.0.1:3847/api/v1/health
# If 3847 is already in use: NODEX_API_PORT=3848 npm run docker:api:up
#
# SQLite: do not run multiple nodex-api replicas against the same NODEX_HOST_PROJECT mount.
# Blue/green applies to nodex-web only; a single nodex-api serves both.
#
# Zero-downtime UI deploy: deploy/ZERO-DOWNTIME.md and scripts/docker-web-swap.sh
#
# Full stack (API + gateway + UI) in one step:
#   npm run deploy
#   Open http://127.0.0.1:8080 — WPN workspaces/notes persist in the mounted project JSON workspace.

services:
  # MongoDB for Fastify sync API (ADR-003). Enable: docker compose --profile sync up -d mongo-sync
  mongo-sync:
    profiles: ["sync"]
    image: mongo:7
    container_name: nodex-mongo-sync
    restart: unless-stopped
    ports:
      - "${NODEX_MONGO_SYNC_PORT:-27017}:27017"
    volumes:
      - nodex-mongo-sync-data:/data

  nodex-web-blue:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_NODEX_API_SAME_ORIGIN: ${NEXT_PUBLIC_NODEX_API_SAME_ORIGIN:-1}
    image: nodex-web:local
    container_name: nodex-web-blue
    restart: unless-stopped
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/',(r)=>{let d='';r.on('data',()=>{});r.on('end',()=>process.exit(r.statusCode&&r.statusCode<500?0:1));}).on('error',()=>process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  nodex-web-green:
    profiles: ["green"]
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_NODEX_API_SAME_ORIGIN: ${NEXT_PUBLIC_NODEX_API_SAME_ORIGIN:-1}
    image: nodex-web:local
    container_name: nodex-web-green
    restart: unless-stopped
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/',(r)=>{r.on('data',()=>{});r.on('end',()=>process.exit(r.statusCode&&r.statusCode<500?0:1));}).on('error',()=>process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  nodex-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: nodex-api:local
    container_name: nodex-api
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - "${NODEX_API_PORT:-3847}:3847"
    environment:
      HOST: "0.0.0.0"
      PORT: "3847"
      # Auth signing key (required in production; in dev the API generates a temporary secret if unset).
      NODEX_AUTH_JWT_SECRET: ${NODEX_AUTH_JWT_SECRET:-}
      # Path *inside* the container (see volume mount below)
      NODEX_PROJECT_ROOT: /workspace
      NODEX_USER_DATA_DIR: /nodex-user-data
      # Serve marketplace artifacts from this mounted directory.
      NODEX_MARKETPLACE_DIR: /nodex-marketplace
      NODEX_WPN_DEFAULT_OWNER: ${NODEX_WPN_DEFAULT_OWNER:-jehu}
      # Bundled Documentation guides (manifest + markdown baked into API image; see Dockerfile).
      NODEX_BUNDLED_DOCS_DIR: /app/docs/bundled-plugin-authoring
    volumes:
      # Long-form bind so paths are not mistaken for named volumes (short form treats
      # e.g. $HOME/... as a volume name because it does not start with /).
      - type: bind
        source: ${NODEX_HOST_PROJECT:-./.nodex-docker-workspace}
        target: /workspace
      # Host marketplace artifacts (run `npm run build:plugins` to populate dist/plugins).
      - type: bind
        source: ./dist/plugins
        target: /nodex-marketplace
      - nodex-user-data:/nodex-user-data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3847/api/v1/health',(r)=>{let b='';r.on('data',(c)=>{b+=c});r.on('end',()=>process.exit(r.statusCode===200?0:1));}).on('error',()=>process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  nodex-gateway:
    image: nginx:1.26-alpine
    container_name: nodex-gateway
    restart: unless-stopped
    ports:
      - "${NODEX_GATEWAY_PORT:-8080}:80"
    volumes:
      - type: bind
        source: ./deploy/nginx-gateway.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
      # Outside conf.d/*.conf so nginx does not load this twice (would duplicate upstream).
      - type: bind
        source: ./deploy/nginx-active-web.upstream.conf
        target: /etc/nginx/active-web.upstream.conf
        read_only: false
    depends_on:
      nodex-api:
        condition: service_healthy
      nodex-web-blue:
        condition: service_healthy

  # Local S3-compatible storage for marketplace publishing dev.
  # Enable with: docker compose --profile marketplace up --build
  minio:
    profiles: ["marketplace"]
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: nodex-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${NODEX_MARKET_S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${NODEX_MARKET_S3_SECRET_KEY:-minioadmin}
    volumes:
      - nodex-minio-data:/data

volumes:
  nodex-user-data:
  nodex-minio-data:
  nodex-mongo-sync-data:
