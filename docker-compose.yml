# Default stack: nodex-sync-api + nodex-web-blue + nodex-gateway (WPN in Mongo).
# Local Mongo (`mongo-sync`) is opt-in via profile `local-mongo` (see NODEX_LOCAL_MONGO in scripts).
# See docs/deploy-nodex-sync.md
#
# Usage (gateway on host port NODEX_GATEWAY_PORT, default 8080):
#   npm run docker:api:up
#
# Optional: legacy headless Express (JSON workspace on bind mount, port 3847):
#   docker compose --profile legacy up -d nodex-api
#   Set NODEX_HOST_PROJECT to your vault (Compose does not expand $HOME in .env files):
#     export NODEX_HOST_PROJECT="$HOME/Documents/my-vault"
#
# If unset for legacy, Compose uses ./.nodex-docker-workspace (created as needed).
#
# Build image only (legacy API): npm run docker:api:build
# Detached:        npm run docker:api:up:detached
# Stop:            npm run docker:api:down
# Follow logs:     npm run docker:logs
#
# Unified gateway (nginx, default 8080 — see deploy/ZERO-DOWNTIME.md):
#   - / → Next UI (active nodex-web-blue or nodex-web-green)
#   - /api/v1/* → nodex-sync-api:4010; GET /health → sync-api root probe
#
# Direct sync-api (bypass gateway): http://127.0.0.1:4010/health and http://127.0.0.1:4010/api/v1/…
# Legacy headless (profile legacy): http://127.0.0.1:3847/api/v1/health
#
# Single-writer JSON workspace: do not run multiple nodex-api replicas against the same NODEX_HOST_PROJECT mount.
# Blue/green applies to nodex-web only.
#
# Full stack + UI deploy:
#   npm run deploy
#   Open http://127.0.0.1:8080 — WPN in Mongo (local container with --profile local-mongo, or set MONGODB_URI for remote).

services:
  mongo-sync:
    profiles: ["local-mongo"]
    image: mongo:7
    container_name: nodex-mongo-sync
    restart: unless-stopped
    ports:
      - "${NODEX_MONGO_SYNC_PORT:-27017}:27017"
    volumes:
      - nodex-mongo-sync-data:/data

  nodex-sync-api:
    build:
      context: .
      dockerfile: Dockerfile.sync-api
    image: nodex-sync-api:local
    container_name: nodex-sync-api
    restart: unless-stopped
    ports:
      - "${NODEX_SYNC_API_PORT:-4010}:4010"
    environment:
      HOST: "0.0.0.0"
      PORT: "4010"
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo-sync:27017}
      MONGODB_DB: ${MONGODB_DB:-nodex_sync}
      JWT_SECRET: ${JWT_SECRET:-dev-only-nodex-sync-secret-min-32-chars!!}
      NODEX_BUNDLED_DOCS_DIR: /app/docs/bundled-plugin-authoring
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:4010/health',(r)=>{r.resume();r.on('end',()=>process.exit(r.statusCode===200?0:1));}).on('error',()=>process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  nodex-web-blue:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_NODEX_API_SAME_ORIGIN: ${NEXT_PUBLIC_NODEX_API_SAME_ORIGIN:-0}
        NEXT_PUBLIC_NODEX_WPN_USE_SYNC_API: ${NEXT_PUBLIC_NODEX_WPN_USE_SYNC_API:-1}
        NEXT_PUBLIC_NODEX_WEB_BACKEND: ${NEXT_PUBLIC_NODEX_WEB_BACKEND:-sync-only}
        NEXT_PUBLIC_NODEX_SYNC_API_URL: ${NEXT_PUBLIC_NODEX_SYNC_API_URL:-http://127.0.0.1:8080/api/v1}
    image: nodex-web:local
    container_name: nodex-web-blue
    restart: unless-stopped
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/',(r)=>{let d='';r.on('data',()=>{});r.on('end',()=>process.exit(r.statusCode&&r.statusCode<500?0:1));}).on('error',()=>process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  nodex-web-green:
    profiles: ["green"]
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_NODEX_API_SAME_ORIGIN: ${NEXT_PUBLIC_NODEX_API_SAME_ORIGIN:-0}
        NEXT_PUBLIC_NODEX_WPN_USE_SYNC_API: ${NEXT_PUBLIC_NODEX_WPN_USE_SYNC_API:-1}
        NEXT_PUBLIC_NODEX_WEB_BACKEND: ${NEXT_PUBLIC_NODEX_WEB_BACKEND:-sync-only}
        NEXT_PUBLIC_NODEX_SYNC_API_URL: ${NEXT_PUBLIC_NODEX_SYNC_API_URL:-http://127.0.0.1:8080/api/v1}
    image: nodex-web:local
    container_name: nodex-web-green
    restart: unless-stopped
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/',(r)=>{r.on('data',()=>{});r.on('end',()=>process.exit(r.statusCode&&r.statusCode<500?0:1));}).on('error',()=>process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  nodex-api:
    profiles: ["legacy"]
    build:
      context: .
      dockerfile: Dockerfile
    image: nodex-api:local
    container_name: nodex-api
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - "${NODEX_API_PORT:-3847}:3847"
    environment:
      HOST: "0.0.0.0"
      PORT: "3847"
      # Auth signing key (required in production; in dev the API generates a temporary secret if unset).
      NODEX_AUTH_JWT_SECRET: ${NODEX_AUTH_JWT_SECRET:-}
      # Path *inside* the container (see volume mount below)
      NODEX_PROJECT_ROOT: /workspace
      NODEX_USER_DATA_DIR: /nodex-user-data
      # Serve marketplace artifacts from this mounted directory.
      NODEX_MARKETPLACE_DIR: /nodex-marketplace
      NODEX_WPN_DEFAULT_OWNER: ${NODEX_WPN_DEFAULT_OWNER:-jehu}
      # Bundled Documentation guides (manifest + markdown baked into API image; see Dockerfile).
      NODEX_BUNDLED_DOCS_DIR: /app/docs/bundled-plugin-authoring
    volumes:
      # Long-form bind so paths are not mistaken for named volumes (short form treats
      # e.g. $HOME/... as a volume name because it does not start with /).
      - type: bind
        source: ${NODEX_HOST_PROJECT:-./.nodex-docker-workspace}
        target: /workspace
      # Host marketplace artifacts (run `npm run build:plugins` to populate dist/plugins).
      - type: bind
        source: ./dist/plugins
        target: /nodex-marketplace
      - nodex-user-data:/nodex-user-data
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3847/api/v1/health',(r)=>{let b='';r.on('data',(c)=>{b+=c});r.on('end',()=>process.exit(r.statusCode===200?0:1));}).on('error',()=>process.exit(1));",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  nodex-gateway:
    image: nginx:1.26-alpine
    container_name: nodex-gateway
    restart: unless-stopped
    ports:
      - "${NODEX_GATEWAY_PORT:-8080}:80"
    volumes:
      - type: bind
        source: ./deploy/nginx-gateway.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
      # Outside conf.d/*.conf so nginx does not load this twice (would duplicate upstream).
      - type: bind
        source: ./deploy/nginx-active-web.upstream.conf
        target: /etc/nginx/active-web.upstream.conf
        read_only: false
    depends_on:
      nodex-sync-api:
        condition: service_healthy
      nodex-web-blue:
        condition: service_healthy

  # Local S3-compatible storage for marketplace publishing dev.
  # Enable with: docker compose --profile marketplace up --build
  minio:
    profiles: ["marketplace"]
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: nodex-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${NODEX_MARKET_S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${NODEX_MARKET_S3_SECRET_KEY:-minioadmin}
    volumes:
      - nodex-minio-data:/data

volumes:
  nodex-user-data:
  nodex-minio-data:
  nodex-mongo-sync-data:
