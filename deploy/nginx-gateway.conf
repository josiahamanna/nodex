# Mounted as /etc/nginx/conf.d/default.conf in the official nginx image.
# Upstreams: nodex-api (Compose service), Next on host via host.docker.internal.
# Linux: compose adds extra_hosts host.docker.internal:host-gateway.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

upstream nodex_api {
    least_conn;
    server nodex-api:3847;
    # Add more servers only with separate volumes per replica (SQLite is not safe
    # with multiple containers on the same project mount).
    # server nodex-api-2:3847;
}

upstream nodex_web {
    server host.docker.internal:3000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 64m;

    location /backend/api/ {
        proxy_pass http://nodex_api/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /backend/market/ {
        proxy_pass http://nodex_api/marketplace/files/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Same-origin aliases for the web shim and API JSON (filesBasePath).
    location /api/v1/ {
        proxy_pass http://nodex_api/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /marketplace/files/ {
        proxy_pass http://nodex_api/marketplace/files/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://nodex_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
